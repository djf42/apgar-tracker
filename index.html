document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

textarea:focus{border-color:#1193D0;box-shadow:0 0 0 3px rgba(17,147,208,.15);}\n  textarea{resize:none;}\n  button{cursor:pointer;border:0;background:none;font-weight:600;}\n  a,a:hover{color:#ee3c36;}\n  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.45;}}\n  .print-only{display:none;}\n  @page{size:11in 8.5in;margin:0;}\n  @media print{\n    .screen-only{display:none !important;}\n    .app-root{background:#fff !important;}\n    .print-only{display:block !important;}\n    .sheet{box-shadow:none !important;margin:0 !important;break-after:page;}\n    .sheet:last-child{break-after:auto;}\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div class=\"app-root\" style=\"min-height:100vh;background:#ebecee;font-family:'Source Sans 3',sans-serif;\">\n  <div class=\"screen-only\" style=\"max-width:460px;margin:0 auto;background:#f6f8f9;min-height:100vh;box-shadow:0 0 40px rgba(2,32,51,.12);display:flex;flex-direction:column;\">\n\n    <!-- Top bar -->\n    <div style=\"background:#022033;padding:12px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:20;\">\n      <sc-if value=\"{{isNewborn}}\" hint-placeholder-val=\"{{false}}\">\n        <button sc-camel-on-click=\"{{back}}\" style=\"color:#84d1f5;font:700 22px 'Outfit',sans-serif;background:none;padding:0 4px 0 0;line-height:1;\">‹<\u002Fbutton>\n      <\u002Fsc-if>\n      <img src=\"ab2edf4d-7d9a-42b2-8760-cde1b23d4928\" alt=\"RECOVER\" style=\"height:26px;width:auto;background:#fff;border-radius:4px;padding:2px 5px;flex:none;\">\n      <div style=\"flex:1;min-width:0;\">\n        <div style=\"font:700 15px 'Outfit',sans-serif;color:#fff;line-height:1;\">{{barTitle}}<\u002Fdiv>\n        <div style=\"font:400 10.5px 'Source Sans 3',sans-serif;color:#84d1f5;margin-top:2px;\">{{barSub}}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============ HOME ============ -->\n    <sc-if value=\"{{isHome}}\" hint-placeholder-val=\"{{true}}\">\n      <div style=\"padding:14px;display:flex;flex-direction:column;gap:14px;padding-bottom:96px;\">\n\n        <!-- Due banner -->\n        <sc-if value=\"{{dueShow}}\" hint-placeholder-val=\"{{false}}\">\n          <div style=\"background:#ee3c36;color:#fff;border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:9px;animation:pulse 1.6s ease-in-out infinite;\">\n            <span style=\"font:700 16px 'Outfit',sans-serif;\">⏱<\u002Fspan>\n            <span style=\"font:600 12.5px 'Source Sans 3',sans-serif;\">{{dueText}}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- Case card -->\n        <div style=\"background:#fff;border:1px solid #e2e7ea;border-radius:12px;overflow:hidden;\">\n          <div style=\"background:#DAF1FC;padding:8px 12px;font:700 12px 'Outfit',sans-serif;color:#022033;display:flex;align-items:center;gap:6px;\">🐾 Case details<\u002Fdiv>\n          <div style=\"padding:11px 12px;display:grid;grid-template-columns:1fr 1fr;gap:9px;\">\n            <label style=\"font:600 10px 'Source Sans 3',sans-serif;color:#6a7b84;grid-column:span 2;\">Clinic / hospital\n              <input value=\"{{ci_clinic}}\" sc-camel-on-input=\"{{setClinic}}\" placeholder=\"Clinic name\" style=\"display:block;width:100%;margin-top:3px;padding:8px;font:400 13px 'Source Sans 3',sans-serif;\"><\u002Flabel>\n            <label style=\"font:600 10px 'Source Sans 3',sans-serif;color:#6a7b84;\">Case / record #\n              <input value=\"{{ci_caseNo}}\" sc-camel-on-input=\"{{setCaseNo}}\" placeholder=\"e.g. 24-1039\" style=\"display:block;width:100%;margin-top:3px;padding:8px;font:400 13px 'Source Sans 3',sans-serif;\"><\u002Flabel>\n            <label style=\"font:600 10px 'Source Sans 3',sans-serif;color:#6a7b84;\">Species\n              <div style=\"display:flex;gap:6px;margin-top:3px;\">\n                <button sc-camel-on-click=\"{{setSpeciesDog}}\" style=\"{{spDogStyle}}\">Dog<\u002Fbutton>\n                <button sc-camel-on-click=\"{{setSpeciesCat}}\" style=\"{{spCatStyle}}\">Cat<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Flabel>\n            <label style=\"font:600 10px 'Source Sans 3',sans-serif;color:#6a7b84;\">Dam name / ID\n              <input value=\"{{ci_dam}}\" sc-camel-on-input=\"{{setDam}}\" placeholder=\"Dam\" style=\"display:block;width:100%;margin-top:3px;padding:8px;font:400 13px 'Source Sans 3',sans-serif;\"><\u002Flabel>\n            <label style=\"font:600 10px 'Source Sans 3',sans-serif;color:#6a7b84;\">Attending clinician\n              <input value=\"{{ci_clinician}}\" sc-camel-on-input=\"{{setClinician}}\" placeholder=\"Name\" style=\"display:block;width:100%;margin-top:3px;padding:8px;font:400 13px 'Source Sans 3',sans-serif;\"><\u002Flabel>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Newborn list header -->\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-top:2px;\">\n          <div style=\"font:700 14px 'Outfit',sans-serif;color:#022033;\">Newborns <span style=\"color:#6a7b84;font-weight:400;\">({{count}}/15)<\u002Fspan><\u002Fdiv>\n          <button sc-camel-on-click=\"{{addNewborn}}\" style=\"{{addStyle}}\">+ Add newborn<\u002Fbutton>\n        <\u002Fdiv>\n\n        <sc-for list=\"{{cards}}\" as=\"c\" hint-placeholder-count=\"3\">\n          <button sc-camel-on-click=\"{{c.open}}\" style=\"text-align:left;background:#fff;border:1px solid #e2e7ea;border-radius:12px;padding:11px 12px;display:flex;flex-direction:column;gap:9px;width:100%;\">\n            <div style=\"display:flex;align-items:center;gap:10px;\">\n              <span style=\"font:700 15px 'Outfit',sans-serif;color:#fff;background:#022033;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none;\">{{c.no}}<\u002Fspan>\n              <div style=\"flex:1;min-width:0;\">\n                <div style=\"font:700 13.5px 'Source Sans 3',sans-serif;color:#022033;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{c.title}}<\u002Fdiv>\n                <div style=\"font:400 11px 'Source Sans 3',sans-serif;color:#6a7b84;margin-top:1px;\">{{c.meta}}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"text-align:right;flex:none;\">\n                <div style=\"font:600 9px 'Source Sans 3',sans-serif;color:#8a99a1;\">LATEST<\u002Fdiv>\n                <div style=\"{{c.latestStyle}}\">{{c.latestVal}}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:6px;\">\n              <sc-for list=\"{{c.chips}}\" as=\"ch\" hint-placeholder-count=\"3\">\n                <div style=\"{{ch.style}}\"><span style=\"font-weight:700;\">{{ch.tp}}m<\u002Fspan> {{ch.text}}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- Export bar -->\n      <div style=\"position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;pointer-events:none;\">\n        <div style=\"max-width:460px;width:100%;padding:12px 14px;background:linear-gradient(to top,#f6f8f9 60%,rgba(246,248,249,0));pointer-events:auto;\">\n          <button sc-camel-on-click=\"{{exportPdf}}\" style=\"width:100%;background:#ee3c36;color:#fff;font:700 14px 'Outfit',sans-serif;padding:14px;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 18px rgba(238,60,54,.3);\">⤓ Export PDF for record<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ NEWBORN ============ -->\n    <sc-if value=\"{{isNewborn}}\" hint-placeholder-val=\"{{false}}\">\n      <div style=\"padding:14px;display:flex;flex-direction:column;gap:13px;padding-bottom:40px;\">\n\n        <!-- Identity -->\n        <div style=\"background:#fff;border:1px solid #e2e7ea;border-radius:12px;padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:10px;\">\n          <label style=\"font:600 10px 'Source Sans 3',sans-serif;color:#6a7b84;grid-column:span 2;\">ID / markings\n            <input value=\"{{cur_markings}}\" sc-camel-on-input=\"{{setMarkings}}\" placeholder=\"birth order, markings, neck-tie colour…\" style=\"display:block;width:100%;margin-top:3px;padding:9px;font:400 13px 'Source Sans 3',sans-serif;\"><\u002Flabel>\n          <label style=\"font:600 10px 'Source Sans 3',sans-serif;color:#6a7b84;\">Sex\n            <div style=\"display:flex;gap:6px;margin-top:3px;\">\n              <button sc-camel-on-click=\"{{setSexM}}\" style=\"{{sexMStyle}}\">M<\u002Fbutton>\n              <button sc-camel-on-click=\"{{setSexF}}\" style=\"{{sexFStyle}}\">F<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Flabel>\n          <label style=\"font:600 10px 'Source Sans 3',sans-serif;color:#6a7b84;\">Weight (g)\n            <input value=\"{{cur_weight}}\" sc-camel-on-input=\"{{setWeight}}\" inputmode=\"numeric\" placeholder=\"g\" style=\"display:block;width:100%;margin-top:3px;padding:9px;font:400 13px 'Source Sans 3',sans-serif;\"><\u002Flabel>\n          <label style=\"font:600 10px 'Source Sans 3',sans-serif;color:#6a7b84;\">Delivery\n            <div style=\"display:flex;gap:6px;margin-top:3px;\">\n              <button sc-camel-on-click=\"{{setDelE}}\" style=\"{{delEStyle}}\">Eutocia<\u002Fbutton>\n              <button sc-camel-on-click=\"{{setDelC}}\" style=\"{{delCStyle}}\">C-section<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Flabel>\n          <label style=\"font:600 10px 'Source Sans 3',sans-serif;color:#6a7b84;\">Congenital defects\n            <input value=\"{{cur_defects}}\" sc-camel-on-input=\"{{setDefects}}\" placeholder=\"none noted\" style=\"display:block;width:100%;margin-top:3px;padding:9px;font:400 13px 'Source Sans 3',sans-serif;\"><\u002Flabel>\n          <div style=\"grid-column:span 2;display:flex;align-items:flex-end;gap:8px;\">\n            <label style=\"font:600 10px 'Source Sans 3',sans-serif;color:#6a7b84;flex:1;\">Time of birth\n              <input type=\"datetime-local\" value=\"{{cur_birthInput}}\" sc-camel-on-input=\"{{setBirth}}\" style=\"display:block;width:100%;margin-top:3px;padding:8px;font:400 12.5px 'Source Sans 3',sans-serif;\"><\u002Flabel>\n            <button sc-camel-on-click=\"{{setBirthNow}}\" style=\"background:#DAF1FC;color:#022033;font:700 11px 'Outfit',sans-serif;padding:9px 12px;border-radius:8px;flex:none;\">Now<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Timepoint tabs -->\n        <div style=\"display:flex;gap:8px;\">\n          <sc-for list=\"{{tabs}}\" as=\"t\" hint-placeholder-count=\"3\">\n            <button sc-camel-on-click=\"{{t.on}}\" style=\"{{t.style}}\">\n              <div style=\"font:700 15px 'Outfit',sans-serif;line-height:1;\">{{t.label}}<\u002Fdiv>\n              <div style=\"font:600 9.5px 'Source Sans 3',sans-serif;margin-top:3px;\">{{t.sub}}<\u002Fdiv>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- Score entry -->\n        <div style=\"background:#fff;border:1px solid #e2e7ea;border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:12px;\">\n          <sc-for list=\"{{scoreRows}}\" as=\"r\" hint-placeholder-count=\"5\">\n            <div>\n              <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:5px;\">\n                <div style=\"font:700 12.5px 'Outfit',sans-serif;color:#022033;\">{{r.name}}<\u002Fdiv>\n                <div style=\"font:400 10px 'Source Sans 3',sans-serif;color:#8a99a1;font-style:italic;\">{{r.assess}}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:7px;\">\n                <sc-for list=\"{{r.opts}}\" as=\"o\" hint-placeholder-count=\"3\">\n                  <button sc-camel-on-click=\"{{o.on}}\" style=\"{{o.style}}\">\n                    <span style=\"font:700 15px 'Outfit',sans-serif;\">{{o.v}}<\u002Fspan>\n                    <span style=\"font:600 9px 'Source Sans 3',sans-serif;line-height:1.15;\">{{o.label}}<\u002Fspan>\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n\n          <!-- Total + band -->\n          <div style=\"display:flex;align-items:center;gap:12px;border-top:1px solid #eef1f3;padding-top:11px;\">\n            <div style=\"flex:none;text-align:center;\">\n              <div style=\"font:700 30px 'Outfit',sans-serif;color:#022033;line-height:1;\">{{totalText}}<\u002Fdiv>\n              <div style=\"font:600 9px 'Source Sans 3',sans-serif;color:#8a99a1;\">/ 10<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"{{bandStyle}}\">{{bandText}}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Flags -->\n        <sc-for list=\"{{flags}}\" as=\"f\" hint-placeholder-count=\"0\">\n          <div style=\"{{f.style}}\"><span style=\"font-weight:700;\">{{f.icon}}<\u002Fspan> {{f.text}}<\u002Fdiv>\n        <\u002Fsc-for>\n\n        <!-- Notes -->\n        <div style=\"background:#fff;border:1px solid #e2e7ea;border-radius:12px;padding:12px;\">\n          <div style=\"font:700 12px 'Outfit',sans-serif;color:#022033;margin-bottom:6px;\">Notes / interventions <span style=\"font-weight:400;color:#8a99a1;\">(this newborn)<\u002Fspan><\u002Fdiv>\n          <textarea value=\"{{cur_notes}}\" sc-camel-on-input=\"{{setNotes}}\" placeholder=\"drying · stimulation · airway · PPV · reversal · O₂ · chest compressions…\" style=\"width:100%;height:74px;padding:9px;font:400 12.5px 'Source Sans 3',sans-serif;line-height:1.35;\"><\u002Ftextarea>\n        <\u002Fdiv>\n\n        <button sc-camel-on-click=\"{{deleteCur}}\" style=\"align-self:center;color:#ee3c36;font:600 12px 'Source Sans 3',sans-serif;padding:8px 14px;background:none;\">Remove this newborn<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <!-- ============ PRINT-ONLY FILLED CHART ============ -->\n  <div class=\"print-only\">\n    <sc-for list=\"{{printSides}}\" as=\"side\" hint-placeholder-count=\"2\">\n      <div class=\"sheet\" style=\"width:11in;height:8.5in;background:#fff;padding:0.26in 0.3in;display:flex;flex-direction:column;overflow:hidden;\">\n        <div style=\"display:flex;align-items:center;gap:14px;background:#022033;padding:8px 12px;border-radius:6px;flex:none;\">\n          <img src=\"ab2edf4d-7d9a-42b2-8760-cde1b23d4928\" alt=\"RECOVER\" style=\"height:40px;width:auto;flex:none;background:#fff;border-radius:5px;padding:3px 7px;\">\n          <div style=\"flex:1;min-width:0;\">\n            <div style=\"font:700 19px 'Outfit',sans-serif;color:#fff;line-height:1;\">Apgar Scoring Sheet for Newborns<\u002Fdiv>\n            <div style=\"font:400 10.5px 'Source Sans 3',sans-serif;color:#84d1f5;margin-top:3px;\">{{caseLine}}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align:right;flex:none;\">\n            <div style=\"font:700 12px 'Outfit',sans-serif;color:#fff;background:#ee3c36;padding:3px 11px;border-radius:4px;display:inline-block;\">{{side.label}}<\u002Fdiv>\n            <div style=\"font:600 10px 'Source Sans 3',sans-serif;color:#84d1f5;margin-top:5px;\">{{side.range}}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:8px;flex:1;min-height:0;\">\n          <sc-raw-table style=\"width:100%;border-collapse:collapse;table-layout:fixed;\">\n            <sc-raw-thead>\n              <sc-raw-tr>\n                <sc-raw-th style=\"width:9%;background:#022033;color:#fff;font:700 8.5px 'Outfit',sans-serif;padding:3px;border:0.5px solid #022033;\">Newborn ID<\u002Fsc-raw-th>\n                <sc-raw-th style=\"width:4%;background:#022033;color:#fff;font:700 8.5px 'Outfit',sans-serif;padding:3px;border:0.5px solid #022033;\">Sex<\u002Fsc-raw-th>\n                <sc-raw-th style=\"width:5%;background:#022033;color:#fff;font:700 8.5px 'Outfit',sans-serif;padding:3px;border:0.5px solid #022033;\">Wt (g)<\u002Fsc-raw-th>\n                <sc-raw-th style=\"width:5%;background:#022033;color:#fff;font:700 8.5px 'Outfit',sans-serif;padding:3px;border:0.5px solid #022033;\">Del.<\u002Fsc-raw-th>\n                <sc-raw-th style=\"width:9%;background:#022033;color:#fff;font:700 8.5px 'Outfit',sans-serif;padding:3px;border:0.5px solid #022033;\">Cong. defects<\u002Fsc-raw-th>\n                <sc-raw-th style=\"width:3.5%;background:#022033;color:#fff;font:700 8.5px 'Outfit',sans-serif;padding:3px;border:0.5px solid #022033;\">Min<\u002Fsc-raw-th>\n                <sc-raw-th style=\"width:6.5%;background:#022033;color:#fff;font:700 8.5px 'Outfit',sans-serif;padding:3px;border:0.5px solid #022033;\">MM Color<\u002Fsc-raw-th>\n                <sc-raw-th style=\"width:6.5%;background:#022033;color:#fff;font:700 8.5px 'Outfit',sans-serif;padding:3px;border:0.5px solid #022033;\">HR<\u002Fsc-raw-th>\n                <sc-raw-th style=\"width:6.5%;background:#022033;color:#fff;font:700 8.5px 'Outfit',sans-serif;padding:3px;border:0.5px solid #022033;\">Reflex<\u002Fsc-raw-th>\n                <sc-raw-th style=\"width:6.5%;background:#022033;color:#fff;font:700 8.5px 'Outfit',sans-serif;padding:3px;border:0.5px solid #022033;\">Motility<\u002Fsc-raw-th>\n                <sc-raw-th style=\"width:6.5%;background:#022033;color:#fff;font:700 8.5px 'Outfit',sans-serif;padding:3px;border:0.5px solid #022033;\">RR &amp; Effort<\u002Fsc-raw-th>\n                <sc-raw-th style=\"width:3.5%;background:#ee3c36;color:#fff;font:700 8.5px 'Outfit',sans-serif;padding:3px;border:0.5px solid #022033;\">Total<\u002Fsc-raw-th>\n                <sc-raw-th style=\"width:22.5%;background:#022033;color:#fff;font:700 8.5px 'Outfit',sans-serif;padding:3px;border:0.5px solid #022033;\">Notes / interventions<\u002Fsc-raw-th>\n              <\u002Fsc-raw-tr>\n            <\u002Fsc-raw-thead>\n            <sc-raw-tbody>\n              <sc-for list=\"{{side.rows}}\" as=\"row\" hint-placeholder-count=\"24\">\n                <sc-raw-tr>\n                  <sc-if value=\"{{row.isFirst}}\" hint-placeholder-val=\"{{true}}\">\n                    <sc-raw-td rowspan=\"3\" style=\"border:0.5px solid #b9c4cb;padding:2px;vertical-align:top;background:#fbfdfe;position:relative;font:600 9px 'Source Sans 3',sans-serif;color:#022033;\"><span style=\"position:absolute;top:2px;left:2px;font:700 9px 'Outfit',sans-serif;color:#fff;background:#022033;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;\">{{row.no}}<\u002Fspan><span style=\"display:block;padding-left:19px;line-height:1.2;\">{{row.markings}}<\u002Fspan><\u002Fsc-raw-td>\n                    <sc-raw-td rowspan=\"3\" style=\"border:0.5px solid #b9c4cb;text-align:center;background:#fbfdfe;font:600 10px 'Source Sans 3',sans-serif;\">{{row.sex}}<\u002Fsc-raw-td>\n                    <sc-raw-td rowspan=\"3\" style=\"border:0.5px solid #b9c4cb;text-align:center;background:#fbfdfe;font:600 10px 'Source Sans 3',sans-serif;\">{{row.weight}}<\u002Fsc-raw-td>\n                    <sc-raw-td rowspan=\"3\" style=\"border:0.5px solid #b9c4cb;text-align:center;background:#fbfdfe;font:600 10px 'Source Sans 3',sans-serif;\">{{row.delivery}}<\u002Fsc-raw-td>\n                    <sc-raw-td rowspan=\"3\" style=\"border:0.5px solid #b9c4cb;padding:2px;vertical-align:top;background:#fbfdfe;font:400 8.5px 'Source Sans 3',sans-serif;line-height:1.2;\">{{row.defects}}<\u002Fsc-raw-td>\n                  <\u002Fsc-if>\n                  <sc-raw-td style=\"border:0.5px solid #b9c4cb;background:#eef7fc;text-align:center;font:700 10px 'Outfit',sans-serif;color:#022033;height:21px;\">{{row.time}}<\u002Fsc-raw-td>\n                  <sc-raw-td style=\"border:0.5px solid #b9c4cb;text-align:center;font:600 12px 'Source Sans 3',sans-serif;\">{{row.mm}}<\u002Fsc-raw-td>\n                  <sc-raw-td style=\"border:0.5px solid #b9c4cb;text-align:center;font:600 12px 'Source Sans 3',sans-serif;\">{{row.hr}}<\u002Fsc-raw-td>\n                  <sc-raw-td style=\"border:0.5px solid #b9c4cb;text-align:center;font:600 12px 'Source Sans 3',sans-serif;\">{{row.reflex}}<\u002Fsc-raw-td>\n                  <sc-raw-td style=\"border:0.5px solid #b9c4cb;text-align:center;font:600 12px 'Source Sans 3',sans-serif;\">{{row.mot}}<\u002Fsc-raw-td>\n                  <sc-raw-td style=\"border:0.5px solid #b9c4cb;text-align:center;font:600 12px 'Source Sans 3',sans-serif;\">{{row.resp}}<\u002Fsc-raw-td>\n                  <sc-raw-td style=\"border:0.5px solid #b9c4cb;text-align:center;background:#DAF1FC;font:700 12px 'Outfit',sans-serif;color:#022033;\">{{row.total}}<\u002Fsc-raw-td>\n                  <sc-if value=\"{{row.isFirst}}\" hint-placeholder-val=\"{{true}}\">\n                    <sc-raw-td rowspan=\"3\" style=\"border:0.5px solid #b9c4cb;padding:3px;vertical-align:top;font:400 8.5px 'Source Sans 3',sans-serif;line-height:1.25;\">{{row.notes}}<\u002Fsc-raw-td>\n                  <\u002Fsc-if>\n                <\u002Fsc-raw-tr>\n              <\u002Fsc-for>\n            <\u002Fsc-raw-tbody>\n          <\u002Fsc-raw-table>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:6px;font:400 8px 'Source Sans 3',sans-serif;color:#6a7b84;flex:none;\">\n          <div>Score 0–2 per parameter · 0–3 weak · 4–6 moderate · 7–10 normal. No Apgar threshold triggers resuscitation — use the algorithm.<\u002Fdiv>\n          <div>The RECOVER Initiative · Newborn Resuscitation Guidelines (Boller et al., <i>JVECC<\u002Fi> 2025)<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:460,&quot;height&quot;:900}}\">\nconst KEY = 'recover-apgar-litter-v1';\nconst PARAMS = [\n  { key: 'mm', name: 'Mucous Membrane Color', assess: 'Oral mucosa', opts: ['Cyanotic / pale', 'Pale pink', 'Pink'] },\n  { key: 'hr', name: 'Heart Rate', assess: 'Auscultate L. chest', opts: ['< 180 bpm', '180–220 bpm', '> 220 bpm'] },\n  { key: 'reflex', name: 'Reflex Irritability', assess: 'Pinch interdigital web', opts: ['Absent', 'Grimace / weak', 'Vigorous'] },\n  { key: 'mot', name: 'Motility (muscle tone)', assess: 'Supine — watch movement', opts: ['Flaccid / none', 'Some flexion', 'Active'] },\n  { key: 'resp', name: 'Resp. Rate & Effort', assess: 'Watch chest & cry', opts: ['Absent / gasping', 'Weak, irregular', 'Regular · cry'] },\n];\nconst TPS = [5, 30, 60];\nconst VC = ['#ee3c36', '#E0A100', '#1F8A5B'];\n\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.state = { view: 'home', selId: null, curTp: 5, tick: Date.now(), data: this.load() };\n  }\n  load() {\n    try { const r = localStorage.getItem(KEY); if (r) return JSON.parse(r); } catch (e) {}\n    return { caseInfo: { clinic: '', caseNo: '', dam: '', species: '', clinician: '' }, newborns: [this.blank()] };\n  }\n  blank() {\n    return { id: 'n' + Date.now() + Math.random().toString(36).slice(2, 5), markings: '', sex: '', weight: '', delivery: '', birthMs: null, defects: '', notes: '', scores: {} };\n  }\n  persist() { try { localStorage.setItem(KEY, JSON.stringify(this.state.data)); } catch (e) {} }\n  componentDidMount() { this.timer = setInterval(() => this.setState({ tick: Date.now() }), 1000); }\n  componentWillUnmount() { clearInterval(this.timer); }\n  edit(mut) { this.setState((s) => { const d = JSON.parse(JSON.stringify(s.data)); mut(d); return { data: d }; }, () => this.persist()); }\n  // silent update (no re-render) for free-text inputs to avoid caret jumps\n  quiet(mut) { mut(this.state.data); this.persist(); }\n  cur() { return this.state.data.newborns.find((n) => n.id === this.state.selId); }\n  totalOf(nb, tp) {\n    const sc = nb.scores[tp]; if (!sc) return null;\n    let sum = 0, c = 0; PARAMS.forEach((p) => { if (sc[p.key] != null) { sum += sc[p.key]; c++; } });\n    return { sum, complete: c === 5, count: c };\n  }\n  band(sum) {\n    if (sum <= 3) return { t: 'Weak — severely depressed', c: '#ee3c36', bg: '#fdeceb' };\n    if (sum <= 6) return { t: 'Moderate vitality', c: '#E0A100', bg: '#fdf4e0' };\n    return { t: 'Normal · vigorous', c: '#1F8A5B', bg: '#e8f5ee' };\n  }\n  fmt(ms) { if (ms < 0) ms = 0; const s = Math.round(ms / 1000); return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0'); }\n  toInput(ms) { if (!ms) return ''; const d = new Date(ms - new Date().getTimezoneOffset() * 60000); return d.toISOString().slice(0, 16); }\n\n  renderVals() {\n    const st = this.state, D = st.data, now = st.tick;\n    const isHome = st.view === 'home', isNewborn = st.view === 'newborn';\n    const ci = D.caseInfo;\n    const seg = (active) => 'flex:1;padding:8px 0;border-radius:8px;font:700 12px \\'Outfit\\',sans-serif;border:1px solid ' + (active ? '#022033' : '#cdd6db') + ';background:' + (active ? '#022033' : '#fff') + ';color:' + (active ? '#fff' : '#4a5a63') + ';';\n\n    // ---- HOME cards ----\n    const cards = D.newborns.map((nb, i) => {\n      const chips = TPS.map((tp) => {\n        const t = this.totalOf(nb, tp);\n        let style = 'flex:1;text-align:center;border-radius:7px;padding:6px 2px;font:400 10.5px \\'Source Sans 3\\',sans-serif;border:1px solid ';\n        let text = '';\n        if (t && t.complete) { style += '#1F8A5B;background:#e8f5ee;color:#1F8A5B;'; text = '= ' + t.sum; }\n        else if (t && t.count > 0) { style += '#E0A100;background:#fdf4e0;color:#9a7100;'; text = 'partial'; }\n        else if (nb.birthMs) {\n          const rem = nb.birthMs + tp * 60000 - now;\n          if (rem > 0) { style += '#cdd6db;background:#fff;color:#8a99a1;'; text = 'in ' + this.fmt(rem); }\n          else { style += '#ee3c36;background:#fdeceb;color:#ee3c36;font-weight:700;'; text = 'DUE'; }\n        } else { style += '#cdd6db;background:#fff;color:#b0bcc3;'; text = '—'; }\n        return { tp, style, text };\n      });\n      // latest complete score\n      let latestVal = '—', bg = '#eef1f3', col = '#8a99a1';\n      for (let k = TPS.length - 1; k >= 0; k--) { const t = this.totalOf(nb, TPS[k]); if (t && t.complete) { const b = this.band(t.sum); latestVal = String(t.sum); bg = b.bg; col = b.c; break; } }\n      const latestStyle = 'font:700 20px \\'Outfit\\',sans-serif;color:' + col + ';background:' + bg + ';border-radius:8px;min-width:38px;padding:2px 4px;margin-top:1px;';\n      const meta = [nb.sex ? (nb.sex === 'M' ? 'Male' : 'Female') : null, nb.weight ? nb.weight + ' g' : null, nb.delivery === 'E' ? 'Eutocia' : nb.delivery === 'C' ? 'C-section' : null].filter(Boolean).join('  ·  ') || 'Tap to add details';\n      return { no: i + 1, id: nb.id, title: nb.markings || ('Newborn ' + (i + 1)), meta, chips, latestVal, latestStyle, open: () => this.setState({ view: 'newborn', selId: nb.id, curTp: 5 }) };\n    });\n\n    // due banner\n    let dueCount = 0;\n    D.newborns.forEach((nb) => { if (!nb.birthMs) return; TPS.forEach((tp) => { const t = this.totalOf(nb, tp); if (!(t && t.complete) && nb.birthMs + tp * 60000 - now <= 0) dueCount++; }); });\n    const dueText = dueCount === 1 ? '1 assessment is due now' : dueCount + ' assessments are due now';\n\n    const out = {\n      isHome, isNewborn,\n      barTitle: isHome ? 'Apgar Tracker' : ('Newborn ' + (D.newborns.findIndex((n) => n.id === st.selId) + 1)),\n      barSub: isHome ? 'Serial newborn assessment' : (this.cur() && this.cur().markings ? this.cur().markings : 'Score at 5, 30 & 60 min'),\n      // case\n      ci_clinic: ci.clinic, ci_caseNo: ci.caseNo, ci_dam: ci.dam, ci_clinician: ci.clinician,\n      setClinic: (e) => this.quiet((d) => { d.caseInfo.clinic = e.target.value; }),\n      setCaseNo: (e) => this.quiet((d) => { d.caseInfo.caseNo = e.target.value; }),\n      setDam: (e) => this.quiet((d) => { d.caseInfo.dam = e.target.value; }),\n      setClinician: (e) => this.quiet((d) => { d.caseInfo.clinician = e.target.value; }),\n      setSpeciesDog: () => this.edit((d) => { d.caseInfo.species = 'Dog'; }),\n      setSpeciesCat: () => this.edit((d) => { d.caseInfo.species = 'Cat'; }),\n      spDogStyle: seg(ci.species === 'Dog'), spCatStyle: seg(ci.species === 'Cat'),\n      count: D.newborns.length,\n      addStyle: 'background:' + (D.newborns.length >= 15 ? '#cdd6db' : '#ee3c36') + ';color:#fff;font:700 11.5px \\'Outfit\\',sans-serif;padding:8px 12px;border-radius:9px;',\n      addNewborn: () => { if (D.newborns.length < 15) this.edit((d) => d.newborns.push(this.blank())); },\n      cards,\n      dueShow: dueCount > 0, dueText,\n      exportPdf: () => { try { window.print(); } catch (e) {} },\n    };\n\n    // ---- NEWBORN view ----\n    const nb = this.cur();\n    if (isNewborn && nb) {\n      const tp = st.curTp;\n      out.cur_markings = nb.markings; out.cur_weight = nb.weight; out.cur_defects = nb.defects; out.cur_notes = nb.notes;\n      out.cur_birthInput = this.toInput(nb.birthMs);\n      out.setMarkings = (e) => this.quiet((d) => { d.newborns.find((n) => n.id === nb.id).markings = e.target.value; });\n      out.setWeight = (e) => this.quiet((d) => { d.newborns.find((n) => n.id === nb.id).weight = e.target.value; });\n      out.setDefects = (e) => this.quiet((d) => { d.newborns.find((n) => n.id === nb.id).defects = e.target.value; });\n      out.setNotes = (e) => this.quiet((d) => { d.newborns.find((n) => n.id === nb.id).notes = e.target.value; });\n      out.setBirth = (e) => { const v = e.target.value ? new Date(e.target.value).getTime() : null; this.edit((d) => { d.newborns.find((n) => n.id === nb.id).birthMs = v; }); };\n      out.setBirthNow = () => this.edit((d) => { d.newborns.find((n) => n.id === nb.id).birthMs = Date.now(); });\n      out.setSexM = () => this.edit((d) => { d.newborns.find((n) => n.id === nb.id).sex = 'M'; });\n      out.setSexF = () => this.edit((d) => { d.newborns.find((n) => n.id === nb.id).sex = 'F'; });\n      out.sexMStyle = seg(nb.sex === 'M'); out.sexFStyle = seg(nb.sex === 'F');\n      out.setDelE = () => this.edit((d) => { d.newborns.find((n) => n.id === nb.id).delivery = 'E'; });\n      out.setDelC = () => this.edit((d) => { d.newborns.find((n) => n.id === nb.id).delivery = 'C'; });\n      out.delEStyle = seg(nb.delivery === 'E'); out.delCStyle = seg(nb.delivery === 'C');\n      out.back = () => this.setState({ view: 'home' });\n      out.deleteCur = () => { this.edit((d) => { d.newborns = d.newborns.filter((n) => n.id !== nb.id); if (!d.newborns.length) d.newborns.push(this.blank()); }); this.setState({ view: 'home' }); };\n\n      // tabs\n      out.tabs = TPS.map((x) => {\n        const t = this.totalOf(nb, x);\n        let sub = 'not scored';\n        if (t && t.complete) sub = 'done · ' + t.sum + '/10';\n        else if (t && t.count) sub = 'partial';\n        else if (nb.birthMs) { const rem = nb.birthMs + x * 60000 - now; sub = rem > 0 ? 'in ' + this.fmt(rem) : 'DUE now'; }\n        const active = x === tp;\n        const due = nb.birthMs && !(t && t.count) && nb.birthMs + x * 60000 - now <= 0;\n        const bc = active ? '#022033' : due ? '#ee3c36' : '#cdd6db';\n        const style = 'flex:1;padding:9px 0;border-radius:10px;border:1px solid ' + bc + ';background:' + (active ? '#022033' : '#fff') + ';color:' + (active ? '#fff' : due ? '#ee3c36' : '#4a5a63') + ';';\n        return { label: x + ' min', sub, style, on: () => this.setState({ curTp: x }) };\n      });\n\n      const sc = nb.scores[tp] || {};\n      out.scoreRows = PARAMS.map((p) => ({\n        name: p.name, assess: p.assess,\n        opts: p.opts.map((label, v) => {\n          const selected = sc[p.key] === v;\n          const c = VC[v];\n          const style = 'flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 2px;border-radius:10px;border:1.5px solid ' + (selected ? c : '#dfe5e9') + ';background:' + (selected ? c : '#fff') + ';color:' + (selected ? '#fff' : '#5a6b74') + ';';\n          return { v, label, style, on: () => this.edit((d) => { const n = d.newborns.find((x) => x.id === nb.id); n.scores[tp] = n.scores[tp] || {}; n.scores[tp][p.key] = (n.scores[tp][p.key] === v ? null : v); }) };\n        }),\n      }));\n\n      const tot = this.totalOf(nb, tp);\n      out.totalText = tot && tot.count ? String(tot.sum) : '–';\n      if (tot && tot.complete) { const b = this.band(tot.sum); out.bandText = b.t; out.bandStyle = 'flex:1;text-align:center;font:700 12.5px \\'Outfit\\',sans-serif;color:' + b.c + ';background:' + b.bg + ';border-radius:9px;padding:10px;'; }\n      else { out.bandText = tot && tot.count ? (5 - tot.count) + ' parameter(s) left' : 'Tap to score each parameter'; out.bandStyle = 'flex:1;text-align:center;font:600 11.5px \\'Source Sans 3\\',sans-serif;color:#8a99a1;background:#f2f5f6;border-radius:9px;padding:10px;'; }\n\n      // flags\n      const flags = [];\n      if (tot && tot.complete && tot.sum <= 6) {\n        const b = this.band(tot.sum);\n        flags.push({ icon: '▲', text: (tot.sum <= 3 ? 'Low Apgar (' : 'Reduced Apgar (') + tot.sum + '/10) — ' + b.t.toLowerCase() + '. Reassess & support per algorithm.', style: 'border-radius:10px;padding:10px 12px;font:600 11.5px \\'Source Sans 3\\',sans-serif;background:' + b.bg + ';color:' + b.c + ';border:1px solid ' + b.c + ';' });\n      }\n      // declining trend\n      const done = TPS.map((x) => this.totalOf(nb, x)).filter((t) => t && t.complete).map((t) => t.sum);\n      if (done.length >= 2 && done[done.length - 1] < done[0]) {\n        flags.push({ icon: '↓', text: 'Declining trend across timepoints (' + done.join(' → ') + '). Escalate monitoring.', style: 'border-radius:10px;padding:10px 12px;font:600 11.5px \\'Source Sans 3\\',sans-serif;background:#fdeceb;color:#ee3c36;border:1px solid #ee3c36;' });\n      }\n      flags.push({ icon: 'ⓘ', text: 'No Apgar threshold triggers resuscitation — base decisions on condition at birth, heart rate, and respiratory rate & effort.', style: 'border-radius:10px;padding:10px 12px;font:400 10.5px \\'Source Sans 3\\',sans-serif;background:#eef7fc;color:#33434c;border-left:3px solid #1193D0;' });\n      out.flags = flags;\n    } else {\n      out.scoreRows = []; out.tabs = []; out.flags = [];\n    }\n\n    // ---- PRINT sides ----\n    const mkRows = (list, offset) => {\n      const rows = [];\n      list.forEach((nb, i) => {\n        const val = (tp, key) => { const s = nb.scores[tp]; return s && s[key] != null ? String(s[key]) : ''; };\n        const tt = (tp) => { const t = this.totalOf(nb, tp); return t && t.count ? String(t.sum) : ''; };\n        TPS.forEach((tp, j) => {\n          rows.push({\n            no: offset + i + 1, isFirst: j === 0, time: tp,\n            markings: j === 0 ? (nb.markings || '') : '', sex: nb.sex || '', weight: nb.weight || '',\n            delivery: nb.delivery || '', defects: nb.defects || '', notes: nb.notes || '',\n            mm: val(tp, 'mm'), hr: val(tp, 'hr'), reflex: val(tp, 'reflex'), mot: val(tp, 'mot'), resp: val(tp, 'resp'), total: tt(tp),\n          });\n        });\n      });\n      return rows;\n    };\n    const first = D.newborns.slice(0, 8), second = D.newborns.slice(8, 15);\n    const dstr = new Date().toLocaleDateString();\n    out.caseLine = [ci.clinic, ci.species, ci.dam ? 'Dam: ' + ci.dam : '', ci.caseNo ? 'Case ' + ci.caseNo : '', ci.clinician, dstr].filter(Boolean).join('  ·  ') || ('Printed ' + dstr);\n    out.printSides = [\n      { label: 'Side 1 of 2', range: 'Newborns 1 – 8', rows: mkRows(first, 0) },\n      { label: 'Side 2 of 2', range: 'Newborns 9 – 15', rows: mkRows(second, 8) },\n    ];\n\n    return out;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
